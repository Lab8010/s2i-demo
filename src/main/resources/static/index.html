<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Hat Certification Puzzle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header>
      <h1>Red Hat Certification Puzzle</h1>
      <p>適切な認定資格をドラッグ＆ドロップして、RHCSA / RHCE / RHCA のランプを光らせよう。</p>
    </header>

    <section class="game-panel">
      <div class="panel">
        <h2>認定資格</h2>
        <div id="draggable-list" class="drag-list"></div>
      </div>

      <div class="panel targets-panel">
        <h2>配置エリア</h2>
        <div class="targets">
          <div class="target-card">
            <div class="target-title">基本資格</div>
            <div class="drop-target" data-answer="RHCSA">Drop here</div>
          </div>
          <div class="target-card">
            <div class="target-title">上級資格</div>
            <div class="drop-target" data-answer="RHCE">Drop here</div>
          </div>
          <div class="target-card">
            <div class="target-title">アーキテクト</div>
            <div class="drop-target" data-answer="RHCA">Drop here</div>
          </div>
        </div>
      </div>
    </section>

    <section class="lamps">
      <div class="lamp-card">
        <div class="lamp-label">RHCSA</div>
        <div id="lamp-rhcsa" class="lamp off">OFF</div>
      </div>
      <div class="lamp-card">
        <div class="lamp-label">RHCE</div>
        <div id="lamp-rhce" class="lamp off">OFF</div>
      </div>
      <div class="lamp-card">
        <div class="lamp-label">RHCA</div>
        <div id="lamp-rhca" class="lamp off">OFF</div>
      </div>
    </section>

    <section class="info-panel">
      <h2>動作</h2>
      <ul>
        <li>プレイヤーは資格カードをドラッグして、対応する配置エリアへ置きます。</li>
        <li>正しいカードを配置すると、該当ランプが点灯します。</li>
        <li>RHCSA/RHCE/RHCA を正しく揃えると、3つのランプが全て光ります。</li>
      </ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
